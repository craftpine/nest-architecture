
services:

  nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_app
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/nest_db?schema=public"
      JWT_ACCESS_TOKEN_SECRET: "your-access-secret-key-change-in-production"
      JWT_ACCESS_TOKEN_EXPIRY: "900"
      JWT_REFRESH_TOKEN_SECRET: "your-refresh-secret-key-change-in-production"
      JWT_REFRESH_TOKEN_EXPIRY: "604800"
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nest_network
    restart: unless-stopped

networks:
  nest_network:
    driver: bridge
